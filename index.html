<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
	<title>Gaussian Splat Viewer</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
	<style>
		/* Highlight for active splat marker on map */
		.splat-marker.active .splat-marker-thumb {
			box-shadow: 0 0 0 4px #22c55e, 0 2px 12px rgba(0,0,0,0.6);
			border-color: #22c55e;
		}
		*, *::before, *::after { box-sizing: border-box; }


		   body {
			   overflow: hidden;
			   margin: 0;
			   height: 100svh;
			   width: 100vw;
			   font-family: 'Segoe UI', system-ui, sans-serif;
			   background: #0a0a0f;
			   color: #e8e8f0;
			   /* Add safe area for iOS/Android */
			   padding-top: env(safe-area-inset-top, 0px);
			   padding-bottom: env(safe-area-inset-bottom, 0px);
			   padding-left: env(safe-area-inset-left, 0px);
			   padding-right: env(safe-area-inset-right, 0px);
		   }

		   #canvas {
			   display: block;
			   position: absolute;
			   top: env(safe-area-inset-top, 0px);
			   left: env(safe-area-inset-left, 0px);
			   width: calc(100vw - env(safe-area-inset-left, 0px) - env(safe-area-inset-right, 0px));
			   height: calc(100svh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px));
			   touch-action: none;
		   }

		/* ── Top HUD ── */
		#hud-top {
			position: absolute;
			top: 0; left: 0; right: 0;
			height: 48px;
			z-index: 200;
			display: flex;
			align-items: center;
			padding: 0 14px;
			gap: 10px;
			background: linear-gradient(to bottom, rgba(0,0,0,0.65), transparent);
			pointer-events: none;
		}

		#hud-left {
			display: flex;
			align-items: center;
			gap: 10px;
			min-width: 0;
		}

		#hud-right {
			display: flex;
			align-items: center;
			gap: 8px;
			margin-left: auto;
		}

		#app-title {
			font-size: 13px;
			font-weight: 600;
			letter-spacing: 0.06em;
			color: rgba(255,255,255,0.85);
			text-transform: uppercase;
			white-space: nowrap;
		}

		#fps {
			font-size: 12px;
			font-variant-numeric: tabular-nums;
			color: rgba(255,255,255,0.55);
			background: rgba(0,0,0,0.35);
			padding: 2px 8px;
			border-radius: 20px;
		}

		#camid {
			font-size: 12px;
			color: rgba(255,255,255,0.55);
			background: rgba(0,0,0,0.35);
			padding: 2px 8px;
			border-radius: 20px;
			min-width: 48px;
			text-align: center;
		}

		/* ── Splat browser button ── */
		#splat-browser-btn {
			position: relative;
			z-index: 510;
			width: 36px; height: 36px;
			border-radius: 10px;
			border: 1px solid rgba(255,255,255,0.15);
			background: rgba(20,20,30,0.75);
			backdrop-filter: blur(8px);
			cursor: pointer;
			display: flex; align-items: center; justify-content: center;
			pointer-events: all;
			transition: background 0.2s;
		}
		#splat-browser-btn:hover { background: rgba(40,40,60,0.85); }
		#splat-browser-btn svg { width: 18px; height: 18px; fill: none; stroke: #ccc; stroke-width: 2; }

		/* ── Full-page splat browser overlay ── */
		   #splat-overlay {
			   position: fixed;
			   inset: 0;
			   z-index: 500;
			   background: rgba(6,6,14,0.97);
			   backdrop-filter: blur(20px);
			   display: flex;
			   flex-direction: column;
			   opacity: 0;
			   pointer-events: none;
			   transition: opacity 0.22s ease;
			   height: 100svh;
			   width: 100vw;
			   overflow: hidden;
		   }
		   #splat-overlay.open {
			   opacity: 1;
			   pointer-events: all;
		   }

		   #overlay-header {
			   display: flex;
			   align-items: center;
			   gap: 14px;
			   padding: 16px 24px 12px;
			   border-bottom: 1px solid rgba(255,255,255,0.07);
			   flex-shrink: 0;
		   }
		#overlay-close {
			width: 34px; height: 34px;
			border-radius: 8px;
			border: 1px solid rgba(255,255,255,0.15);
			background: rgba(255,255,255,0.07);
			color: rgba(255,255,255,0.75);
			cursor: pointer;
			display: flex; align-items: center; justify-content: center;
			font-size: 15px;
			transition: background 0.15s;
			flex-shrink: 0;
		}
		#overlay-close:hover { background: rgba(255,255,255,0.16); }
		#overlay-title {
			font-size: 16px;
			font-weight: 700;
			color: rgba(255,255,255,0.9);
			letter-spacing: 0.03em;
		}
		#overlay-count {
			font-size: 12px;
			color: rgba(255,255,255,0.3);
			margin-left: 2px;
		}

		/* ── Map button in overlay header ── */
		#overlay-map-btn {
			margin-left: auto;
			width: 34px; height: 34px;
			border-radius: 8px;
			border: 1px solid rgba(255,255,255,0.15);
			background: rgba(255,255,255,0.07);
			color: rgba(255,255,255,0.75);
			cursor: pointer;
			display: flex; align-items: center; justify-content: center;
			font-size: 16px;
			transition: background 0.15s;
			flex-shrink: 0;
		}
		#overlay-map-btn:hover { background: rgba(255,255,255,0.16); }

		/* ── Map overlay ── */
		#map-overlay {
			position: fixed;
			inset: 0;
			z-index: 600;
			background: rgba(6,6,14,0.98);
			display: flex;
			flex-direction: column;
			opacity: 0;
			pointer-events: none;
			transition: opacity 0.22s ease;
			height: 100svh;
			width: 100vw;
			overflow: hidden;
		}
		#map-overlay.open {
			opacity: 1;
			pointer-events: all;
		}
		#map-header {
			display: flex;
			align-items: center;
			gap: 14px;
			padding: 16px 24px 12px;
			border-bottom: 1px solid rgba(255,255,255,0.07);
			flex-shrink: 0;
		}
		#map-close {
			width: 34px; height: 34px;
			border-radius: 8px;
			border: 1px solid rgba(255,255,255,0.15);
			background: rgba(255,255,255,0.07);
			color: rgba(255,255,255,0.75);
			cursor: pointer;
			display: flex; align-items: center; justify-content: center;
			font-size: 15px;
			transition: background 0.15s;
			flex-shrink: 0;
		}
		#map-close:hover { background: rgba(255,255,255,0.16); }
		#map-title {
			font-size: 16px;
			font-weight: 700;
			color: rgba(255,255,255,0.9);
			letter-spacing: 0.03em;
		}
		#leaflet-map {
			flex: 1 1 0;
			min-height: 0;
			width: 100%;
		}
		/* Custom splat waypoint marker */
		.splat-marker {
			width: 72px;
			cursor: pointer;
			text-align: center;
		}
		.splat-marker-thumb {
			width: 64px; height: 40px;
			border-radius: 8px;
			overflow: hidden;
			border: 2px solid rgba(99,102,241,0.8);
			box-shadow: 0 2px 12px rgba(0,0,0,0.6);
			background: #1e1e3a;
			display: flex; align-items: center; justify-content: center;
			font-size: 22px;
			margin: 0 auto;
		}
		.splat-marker-thumb img {
			width: 100%; height: 100%;
			object-fit: cover;
			display: block;
		}
		.splat-marker-label {
			margin-top: 3px;
			font-size: 10px;
			font-weight: 600;
			color: #fff;
			text-shadow: 0 1px 4px rgba(0,0,0,0.9);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			max-width: 72px;
		}
		.splat-marker-pin {
			width: 2px; height: 8px;
			background: rgba(99,102,241,0.8);
			margin: 0 auto;
		}

		   #overlay-filters {
			   padding: 0;
			   flex-shrink: 0;
			   border-bottom: 1px solid rgba(255,255,255,0.07);
			   display: flex;
			   flex-direction: column;
		   }
		/* Filter toggle bar (always visible) */
		.filter-bar {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 8px 24px;
			cursor: pointer;
			user-select: none;
			min-height: 42px;
		}
		.filter-bar:hover { background: rgba(255,255,255,0.03); }
		.filter-bar-label {
			font-size: 11px;
			font-weight: 700;
			letter-spacing: 0.07em;
			text-transform: uppercase;
			color: rgba(255,255,255,0.35);
			flex-shrink: 0;
		}
		.filter-bar-arrow {
			font-size: 10px;
			color: rgba(255,255,255,0.3);
			transition: transform 0.2s;
			flex-shrink: 0;
			margin-right: 4px;
		}
		.filter-bar-arrow.open { transform: rotate(90deg); }
		.filter-active-chips {
			display: flex;
			gap: 5px;
			flex-wrap: wrap;
			flex: 1;
			min-width: 0;
			align-items: center;
		}
		.filter-active-chip {
			font-size: 10px;
			padding: 2px 8px;
			border-radius: 10px;
			background: rgba(99,102,241,0.22);
			color: #a5b4fc;
			border: 1px solid rgba(99,102,241,0.55);
			white-space: nowrap;
			cursor: pointer;
		}
		.filter-active-chip:hover { background: rgba(99,102,241,0.38); }
		.filter-clear-btn {
			font-size: 10px;
			padding: 2px 8px;
			border-radius: 10px;
			background: rgba(255,255,255,0.07);
			color: rgba(255,255,255,0.4);
			border: 1px solid rgba(255,255,255,0.12);
			cursor: pointer;
			white-space: nowrap;
			flex-shrink: 0;
		}
		.filter-clear-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }
		/* Expandable panel */
		.filter-panel {
			display: none;
			flex-direction: column;
			gap: 4px;
			padding: 4px 24px 14px;
			overflow-y: auto;
			max-height: 40vh;
			-webkit-overflow-scrolling: touch;
		}
		.filter-panel.open { display: flex; }
		.filter-group {
			display: flex;
			flex-direction: row;
			align-items: center;
			gap: 6px;
			flex-wrap: wrap;
			padding: 3px 0;
		}
		.filter-group-header {
			display: none;
		}
		.filter-group-label {
			font-size: 10px;
			font-weight: 700;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			color: rgba(255,255,255,0.28);
			min-width: 44px;
			flex-shrink: 0;
		}
		.filter-group-arrow { display: none; }
		.filter-group-chips {
			display: none;
			flex-wrap: wrap;
			gap: 6px;
		}
		.filter-group-chips.open { display: flex; }
		.filter-more-btn {
			padding: 5px 12px;
			border-radius: 20px;
			border: 1px solid rgba(255,255,255,0.14);
			background: rgba(255,255,255,0.05);
			color: rgba(255,255,255,0.45);
			font-size: 11px;
			cursor: pointer;
			white-space: nowrap;
			transition: background 0.15s, color 0.15s;
		}
		.filter-more-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
		.filter-chip {
			padding: 5px 14px;
			border-radius: 20px;
			border: 1px solid rgba(255,255,255,0.14);
			background: rgba(255,255,255,0.05);
			color: rgba(255,255,255,0.55);
			font-size: 12px;
			cursor: pointer;
			transition: background 0.15s, border-color 0.15s, color 0.15s;
			white-space: nowrap;
			user-select: none;
		}
		.filter-chip:hover { background: rgba(255,255,255,0.1); color: #fff; }
		.filter-chip.active {
			background: rgba(99,102,241,0.22);
			border-color: rgba(99,102,241,0.65);
			color: #a5b4fc;
		}
		#year-filter {
			padding: 5px 10px;
			border-radius: 20px;
			border: 1px solid rgba(255,255,255,0.14);
			background: rgba(255,255,255,0.05);
			color: rgba(255,255,255,0.55);
			font-size: 12px;
			cursor: pointer;
			outline: none;
			margin-left: auto;
		}
		#year-filter option { background: #1a1a2e; color: #fff; }

		   #splat-grid {
			   flex: 1 1 0;
			   min-height: 0;
			   overflow-y: auto;
			   overflow-x: hidden;
			   padding: 20px 24px;
			   display: grid;
			   grid-template-columns: repeat(auto-fill, 280px);
			   grid-auto-rows: min-content;
			   gap: 14px;
			   align-content: start;
			   justify-content: center;
			   -webkit-overflow-scrolling: touch;
		   }
		#splat-grid::-webkit-scrollbar { width: 6px; }
		#splat-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.14); border-radius: 3px; }

		   .splat-card {
			   border-radius: 12px;
			   overflow: hidden;
			   cursor: pointer;
			   border: 1.5px solid rgba(255,255,255,0.07);
			   background: rgba(255,255,255,0.04);
			   transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
			   position: relative;
		   }
		.splat-card:hover {
			border-color: rgba(255,255,255,0.2);
			transform: translateY(-2px);
			box-shadow: 0 8px 24px rgba(0,0,0,0.45);
		}
		.splat-card.active {
			border-color: rgba(99,102,241,0.7);
			box-shadow: 0 0 0 2px rgba(99,102,241,0.22), 0 8px 24px rgba(0,0,0,0.45);
		}
		.splat-card-thumb {
			width: 100%;
			aspect-ratio: 16 / 10;
			background: linear-gradient(135deg, #1e1e3a 0%, #2a2a50 100%);
			overflow: hidden;
		}
		.splat-card-thumb img {
			width: 100%; height: 100%;
			object-fit: cover;
			display: block;
			transition: transform 0.3s;
		}
		.splat-card:hover .splat-card-thumb img { transform: scale(1.05); }
		.splat-card-thumb-emoji {
			display: flex; align-items: center; justify-content: center;
			font-size: 32px;
			width: 100%; height: 100%;
		}
		.splat-card-body { padding: 10px 12px 12px; }
		.splat-card-name {
			font-size: 13px;
			font-weight: 600;
			color: rgba(255,255,255,0.88);
			margin-bottom: 5px;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}
		.splat-card-meta {
			display: flex;
			align-items: center;
			gap: 5px;
			flex-wrap: wrap;
		}
		.splat-tag {
			font-size: 10px;
			padding: 2px 7px;
			border-radius: 10px;
			background: rgba(99,102,241,0.16);
			color: #a5b4fc;
			border: 1px solid rgba(99,102,241,0.28);
			white-space: nowrap;
		}
		.splat-year {
			font-size: 10px;
			padding: 2px 7px;
			border-radius: 10px;
			background: rgba(255,255,255,0.07);
			color: rgba(255,255,255,0.4);
			border: 1px solid rgba(255,255,255,0.1);
			margin-left: auto;
		}
		.splat-card-active-badge {
			position: absolute;
			top: 8px; right: 8px;
			background: rgba(99,102,241,0.88);
			color: #fff;
			font-size: 10px;
			font-weight: 700;
			padding: 2px 8px;
			border-radius: 10px;
			letter-spacing: 0.04em;
		}
		.splat-size-badge {
			position: absolute;
			top: 8px; left: 8px;
			font-size: 10px;
			font-weight: 700;
			padding: 2px 8px;
			border-radius: 10px;
			letter-spacing: 0.04em;
			color: #fff;
		}
		.splat-size-badge.size-tiny     { background: rgba(100,116,139,0.85); }
		.splat-size-badge.size-small    { background: rgba(34,197,94,0.82);   }
		.splat-size-badge.size-medium   { background: rgba(59,130,246,0.85);  }
		.splat-size-badge.size-large    { background: rgba(168,85,247,0.85);  }
		.splat-size-badge.size-huge     { background: rgba(245,158,11,0.88);  }
		.splat-size-badge.size-gigantic { background: rgba(239,68,68,0.88);   }

		/* Cache badge on splat cards */
		.splat-cache-badge {
			position: absolute;
			top: 30px; left: 8px;
			font-size: 9px;
			font-weight: 700;
			padding: 2px 6px;
			border-radius: 8px;
			background: rgba(34,197,94,0.18);
			color: #4ade80;
			border: 1px solid rgba(34,197,94,0.35);
			letter-spacing: 0.04em;
			line-height: 1;
		}

		/* Settings button */
		#overlay-settings-btn {
			width: 34px; height: 34px;
			border-radius: 8px;
			border: 1px solid rgba(255,255,255,0.15);
			background: rgba(255,255,255,0.07);
			color: rgba(255,255,255,0.75);
			cursor: pointer;
			display: flex; align-items: center; justify-content: center;
			font-size: 16px;
			transition: background 0.15s;
			flex-shrink: 0;
		}
		#overlay-settings-btn:hover { background: rgba(255,255,255,0.16); }
		#overlay-settings-btn.active { background: rgba(99,102,241,0.25); border-color: rgba(99,102,241,0.5); }

		/* Settings dropdown */
		#settings-dropdown {
			display: none;
			position: absolute;
			top: 60px; right: 16px;
			z-index: 600;
			background: rgba(12,12,22,0.97);
			backdrop-filter: blur(16px);
			border: 1px solid rgba(255,255,255,0.12);
			border-radius: 12px;
			padding: 12px 14px;
			min-width: 220px;
			box-shadow: 0 8px 32px rgba(0,0,0,0.6);
		}
		#settings-dropdown.open { display: block; }
		.settings-title {
			font-size: 10px;
			font-weight: 700;
			letter-spacing: 0.1em;
			text-transform: uppercase;
			color: rgba(255,255,255,0.3);
			margin-bottom: 10px;
		}
		.settings-row {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 12px;
		}
		.settings-label {
			font-size: 12px;
			color: rgba(255,255,255,0.65);
		}
		#clear-cache-btn {
			font-size: 11px;
			padding: 4px 12px;
			border-radius: 8px;
			border: 1px solid rgba(239,68,68,0.4);
			background: rgba(239,68,68,0.12);
			color: #f87171;
			cursor: pointer;
			transition: background 0.15s;
			white-space: nowrap;
		}
		#clear-cache-btn:hover { background: rgba(239,68,68,0.28); }
		#clear-cache-btn:disabled { opacity: 0.4; cursor: default; }

		/* Indeterminate progress bar (sort phase after download) */
		@keyframes progress-shimmer {
			0%   { background-position: -200% 0; }
			100% { background-position: 200% 0; }
		}
		#progress.indeterminate {
			width: 100% !important;
			transition: none;
			background: linear-gradient(90deg, rgba(99,102,241,0.15), #6366f1, #a78bfa, rgba(99,102,241,0.15));
			background-size: 200% 100%;
			animation: progress-shimmer 1.2s linear infinite;
		}
		#overlay-empty {
			grid-column: 1 / -1;
			text-align: center;
			padding: 60px 0;
			color: rgba(255,255,255,0.25);
			font-size: 14px;
		}

		/* ── Search + Sort bar ── */
		#overlay-search-bar {
			display: flex;
			align-items: center;
			gap: 8px;
			padding: 8px 16px;
			border-bottom: 1px solid rgba(255,255,255,0.07);
			flex-shrink: 0;
		}
		#overlay-search {
			flex: 1;
			background: rgba(255,255,255,0.06);
			border: 1px solid rgba(255,255,255,0.12);
			border-radius: 8px;
			padding: 7px 12px 7px 32px;
			color: rgba(255,255,255,0.85);
			font-size: 13px;
			outline: none;
			font-family: inherit;
			transition: border-color 0.15s, background 0.15s;
		}
		#overlay-search::placeholder { color: rgba(255,255,255,0.25); }
		#overlay-search:focus { border-color: rgba(99,102,241,0.5); background: rgba(255,255,255,0.09); }
		#search-icon {
			position: absolute;
			left: 28px;
			color: rgba(255,255,255,0.3);
			font-size: 13px;
			pointer-events: none;
		}
		#search-wrap {
			position: relative;
			flex: 1;
			display: flex;
			align-items: center;
		}
		#sort-select {
			background: rgba(255,255,255,0.06);
			border: 1px solid rgba(255,255,255,0.12);
			border-radius: 8px;
			padding: 7px 10px;
			color: rgba(255,255,255,0.65);
			font-size: 12px;
			outline: none;
			font-family: inherit;
			cursor: pointer;
			white-space: nowrap;
			flex-shrink: 0;
		}
		#sort-select option { background: #12121e; color: #fff; }
		#sort-select:focus { border-color: rgba(99,102,241,0.5); }

		/* ── Loading name label ── */
		#loading-label {
			position: absolute;
			bottom: 22px;
			left: 50%;
			transform: translateX(-50%);
			z-index: 10;
			font-size: 12px;
			color: rgba(255,255,255,0.5);
			letter-spacing: 0.05em;
			white-space: nowrap;
			pointer-events: none;
		}

		/* ── Description on card ── */
		.splat-card-desc {
			font-size: 11px;
			color: rgba(255,255,255,0.35);
			margin-bottom: 6px;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		/* ── Help panel (bottom-left) ── */
		#help-toggle {
			position: absolute;
			bottom: 14px; left: 14px;
			z-index: 200;
			width: 32px; height: 32px;
			border-radius: 50%;
			border: 1px solid rgba(255,255,255,0.15);
			background: rgba(20,20,30,0.75);
			backdrop-filter: blur(8px);
			cursor: pointer;
			display: flex; align-items: center; justify-content: center;
			font-size: 14px; font-weight: 700;
			color: rgba(255,255,255,0.6);
			pointer-events: all;
			transition: background 0.2s;
		}
		#help-toggle:hover { background: rgba(40,40,60,0.9); }

		#help-panel {
			position: absolute;
			bottom: 54px; left: 14px;
			z-index: 200;
			width: 240px;
			background: rgba(10,10,20,0.92);
			backdrop-filter: blur(12px);
			border: 1px solid rgba(255,255,255,0.1);
			border-radius: 12px;
			padding: 14px;
			font-size: 11px;
			line-height: 1.7;
			color: rgba(255,255,255,0.7);
			display: none;
			pointer-events: all;
		}
		#help-panel.show { display: block; }
		#help-panel h4 {
			margin: 0 0 8px;
			font-size: 11px;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			color: rgba(255,255,255,0.4);
		}
		#help-panel .help-row {
			display: flex; justify-content: space-between; gap: 8px;
		}
		#help-panel .help-key {
			background: rgba(255,255,255,0.1);
			border-radius: 4px;
			padding: 1px 5px;
			font-family: monospace;
			font-size: 10px;
			color: #a5b4fc;
		}

		/* ── Loading spinner ── */
		.scene, #message {
			position: absolute;
			display: flex;
			top: 0; right: 0; left: 0; bottom: 0;
			z-index: 2;
			height: 100%; width: 100%;
			align-items: center;
			justify-content: center;
		}
		#message {
			font-weight: bold;
			font-size: large;
			color: #f87171;
			pointer-events: none;
		}
		.cube-wrapper { transform-style: preserve-3d; }
		.cube {
			transform-style: preserve-3d;
			transform: rotateX(45deg) rotateZ(45deg);
			animation: rotation 2s infinite;
		}
		.cube-faces {
			transform-style: preserve-3d;
			height: 80px; width: 80px;
			position: relative;
			transform-origin: 0 0;
			transform: translateX(0) translateY(0) translateZ(-40px);
		}
		.cube-face {
			position: absolute;
			inset: 0;
			background: #6366f1;
			border: solid 1px rgba(255,255,255,0.3);
		}
		.cube-face.top    { transform: translateZ(80px); }
		.cube-face.front  { transform-origin: 0 50%; transform: rotateY(-90deg); }
		.cube-face.back   { transform-origin: 0 50%; transform: rotateY(-90deg) translateZ(-80px); }
		.cube-face.right  { transform-origin: 50% 0; transform: rotateX(-90deg) translateY(-80px); }
		.cube-face.left   { transform-origin: 50% 0; transform: rotateX(-90deg) translateY(-80px) translateZ(80px); }
		@keyframes rotation {
			0%   { transform: rotateX(45deg) rotateY(0) rotateZ(45deg);  animation-timing-function: cubic-bezier(0.17,0.84,0.44,1); }
			50%  { transform: rotateX(45deg) rotateY(0) rotateZ(225deg); animation-timing-function: cubic-bezier(0.76,0.05,0.86,0.06); }
			100% { transform: rotateX(45deg) rotateY(0) rotateZ(405deg); animation-timing-function: cubic-bezier(0.17,0.84,0.44,1); }
		}

		/* ── Progress bar ── */
		#progress {
			position: absolute;
			top: 0; left: 0;
			height: 3px;
			background: linear-gradient(to right, #6366f1, #a78bfa);
			z-index: 999;
			transition: width 0.1s ease-in-out;
			border-radius: 0 2px 2px 0;
			box-shadow: 0 0 8px rgba(99,102,241,0.6);
		}

		/* ── Mobile joysticks ── */
		#joystick-left, #joystick-right {
			display: none;
			position: absolute;
			bottom: 30px;
			z-index: 400;
			width: 110px; height: 110px;
			border-radius: 50%;
			background: rgba(255,255,255,0.06);
			border: 1.5px solid rgba(255,255,255,0.18);
			backdrop-filter: blur(4px);
			touch-action: none;
		}
		#joystick-left  { left: 30px; }
		#joystick-right { right: 30px; }

		.joystick-knob {
			position: absolute;
			width: 44px; height: 44px;
			border-radius: 50%;
			background: rgba(99,102,241,0.75);
			border: 2px solid rgba(255,255,255,0.4);
			top: 50%; left: 50%;
			transform: translate(-50%, -50%);
			pointer-events: none;
			box-shadow: 0 0 12px rgba(99,102,241,0.5);
		}

		.joystick-label {
			position: absolute;
			top: -22px; left: 50%;
			transform: translateX(-50%);
			font-size: 10px;
			letter-spacing: 0.06em;
			color: rgba(255,255,255,0.4);
			text-transform: uppercase;
			white-space: nowrap;
			pointer-events: none;
		}

		@media (pointer: coarse) {
			#joystick-left, #joystick-right { display: block; }
			#help-toggle, #help-panel { display: none !important; }
		}

		body.nohf .nohf { display: none; }
		body.nohf #progress, body.nohf .cube-face { background: #ff9d0d; }
	</style>
</head>

<body>
	<script>
		if (location.host.includes('hf.space')) document.body.classList.add('nohf');
	</script>

	<canvas id="canvas"></canvas>

	<!-- Top HUD -->
	<div id="hud-top">
		<div id="hud-left">
			<button id="splat-browser-btn" title="Browse scenes">
				<svg viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg>
			</button>
			<span id="app-title" class="nohf">Splat Viewer</span>
			<span id="version" class="nohf"><h6>v5.0.0</h6></span>
		</div>
		<div id="hud-right">
			<span id="camid"></span>
			<span id="fps"></span>
		</div>
	</div>

	<!-- Full-page splat browser overlay -->
	<div id="splat-overlay">
		<div id="overlay-header">
			<button id="overlay-close" title="Close">✕</button>
			<span id="overlay-title">Gaussian Splats [Scenes]</span>
			<span id="overlay-count"></span>
			<button id="overlay-map-btn" title="World map">🗺️</button>
			<button id="overlay-settings-btn" title="Settings">⚙️</button>
		</div>
		<div id="settings-dropdown">
			<div class="settings-title">Cache</div>
			<div class="settings-row">
				<span class="settings-label">Splat data (session)</span>
				<button id="clear-cache-btn">Clear all</button>
			</div>
		</div>
		<div id="overlay-search-bar">
			<div id="search-wrap">
				<span id="search-icon">🔍</span>
				<input id="overlay-search" type="search" placeholder="Søg scener…" autocomplete="off" spellcheck="false" />
			</div>
			<select id="sort-select" title="Sort order">
				<option value="default">Standard</option>
				<option value="name">Navn A–Z</option>
				<option value="size-desc">Størst først</option>
				<option value="size-asc">Mindst først</option>
				<option value="year-desc">Nyeste først</option>
			</select>
		</div>
		<div id="overlay-filters">
			<!-- populated by JS -->
		</div>
		<div id="splat-grid">
			<!-- populated by JS -->
		</div>
	</div>

	<!-- Map overlay -->
	<div id="map-overlay">
		<div id="map-header">
			<button id="map-close" title="Close map">✕</button>
			<span id="map-title">Scene Locations</span>
		</div>
		<div id="leaflet-map"></div>
	</div>

	<!-- Progress bar -->
	<div id="progress"></div>

	<!-- Error message -->
	<div id="message"></div>

	<!-- Loading spinner -->
	<div class="scene" id="spinner">
		<div class="cube-wrapper">
			<div class="cube">
				<div class="cube-faces">
					<div class="cube-face bottom"></div>
					<div class="cube-face top"></div>
					<div class="cube-face left"></div>
					<div class="cube-face right"></div>
					<div class="cube-face back"></div>
					<div class="cube-face front"></div>
				</div>
			</div>
		</div>
	</div>
	<div id="loading-label"></div>

	<!-- Help button + panel -->
	<button id="help-toggle" title="Controls">?</button>
	<div id="help-panel">
		<h4>Controls</h4>
		<div class="help-row"><span>Move</span><span><span class="help-key">W</span><span class="help-key">A</span><span class="help-key">S</span><span class="help-key">D</span></span></div>
		<div class="help-row"><span>Up / Down</span><span><span class="help-key">Space</span> / <span class="help-key">Ctrl</span></span></div>
		<div class="help-row"><span>Sprint</span><span><span class="help-key">Shift</span></span></div>
		<div class="help-row"><span>Look</span><span>Click + Mouse</span></div>
		<div class="help-row"><span>Release mouse</span><span><span class="help-key">Esc</span></span></div>
		<div class="help-row"><span>Browse scenes</span><span><span class="help-key">B</span></span></div>
		<div id="help-save-view-row" class="help-row"><span>Save view</span><span><span class="help-key">V</span></span></div>
		<div class="help-row" style="margin-top:6px;color:rgba(255,255,255,0.4);font-size:10px;"><span>Drop .ply to load</span></div>
	</div>

	<!-- Mobile joysticks -->
	<div id="joystick-left">
		<div class="joystick-knob" id="knob-left"></div>
		<div class="joystick-label">Move</div>
	</div>
	<div id="joystick-right">
		<div class="joystick-knob" id="knob-right"></div>
		<div class="joystick-label">Look</div>
	</div>

	<script src="main.js"></script>
	<script>
		// ── Map overlay logic ──
		const mapOverlayEl = document.getElementById('map-overlay');
		const mapOpenBtn = document.getElementById('overlay-map-btn');
		const mapCloseBtn = document.getElementById('map-close');
		let leafletMap = null;
		let mapMarkers = [];


		function openMap() {
			mapOverlayEl.classList.add('open');
			// Init map lazily
			if (!leafletMap) {
				leafletMap = L.map('leaflet-map', { zoomControl: true }).setView([55.6, 12.34], 11);
				L.tileLayer(
				'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
				{
					maxZoom: 19,
					attribution: '&copy; Esri & contributors'
				}
				).addTo(leafletMap);
			} else {
				// Remove old markers
				mapMarkers.forEach(m => leafletMap.removeLayer(m));
				mapMarkers = [];
				setTimeout(() => leafletMap.invalidateSize(), 50);
			}
			// Always (re)populate markers from splatLibrary
			if (typeof splatLibrary !== 'undefined') {
				let activeMarker = null;
				splatLibrary.forEach((splat, idx) => {
					if (splat.lat == null || splat.lng == null) return;
					const isActive = (typeof activeSplatIndex !== 'undefined' && idx === activeSplatIndex);
					const thumbHtml = splat.image
						? `<div class="splat-marker-thumb"><img src="${splat.image}" alt=""></div>`
						: `<div class="splat-marker-thumb">${splat.emoji || '📍'}</div>`;
					const markerHtml = `<div class="splat-marker${isActive ? ' active' : ''}">${thumbHtml}<div class="splat-marker-pin"></div><div class="splat-marker-label">${splat.name}</div></div>`;
					const icon = L.divIcon({
						html: markerHtml,
						className: '',
						iconSize: [72, 68],
						iconAnchor: [36, 48],
						popupAnchor: [0, -50],
					});
					const marker = L.marker([splat.lat, splat.lng], { icon }).addTo(leafletMap);
					mapMarkers.push(marker);
					if (isActive) activeMarker = marker;
					const popupThumb = splat.image
						? `<img src="${splat.image}" style="width:160px;height:100px;object-fit:cover;border-radius:6px;display:block;margin-bottom:6px;">`
						: `<div style="font-size:36px;text-align:center;margin-bottom:6px;">${splat.emoji || '📍'}</div>`;
					// Add a button to activate the splat
					const popupHtml = `
						<div style="font-family:'Segoe UI',sans-serif;min-width:160px;">
							${popupThumb}
							<b style="font-size:13px;">${splat.name}</b><br>
							<span style="font-size:11px;color:#666;">${splat.desc || ''}</span><br>
							<button onclick="activateSplatFromMap(${idx})" style="margin-top:8px;margin-right:6px;padding:4px 14px;border-radius:7px;border:none;background:#6366f1;color:#fff;font-weight:600;cursor:pointer;">Goto</button>
							<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(splat.lat)},${encodeURIComponent(splat.lng)}" target="_blank" rel="noopener" style="margin-top:8px;padding:4px 14px;border-radius:7px;border:none;background:#22c55e;color:#fff;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block;">Google Maps</a>
						</div>
					`;
					marker.bindPopup(popupHtml);
				});
				// Open popup for active marker if present
				if (activeMarker) setTimeout(() => activeMarker.openPopup(), 150);
			}
			setTimeout(() => leafletMap.invalidateSize(), 80);
		}

		function closeMap() {
			mapOverlayEl.classList.remove('open');
		}

		mapOpenBtn.addEventListener('click', openMap);
		mapCloseBtn.addEventListener('click', closeMap);
		// Close on Escape
		document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeMap(); });
		// Expose function globally
		window.activateSplatFromMap = function(idx) {
			if (typeof splatLibrary !== 'undefined' && splatLibrary[idx]) {
				activeSplatIndex = idx;
				localStorage.setItem("activeSplatIndex", idx);
				// Close map overlay
				closeMap();
				// Properly close splat-overlay and reset overlayOpen so mouse capture works
				if (typeof window.closeOverlay === 'function') window.closeOverlay();
				// Load the splat
				if (typeof window.loadSplat === 'function') window.loadSplat(splatLibrary[idx]);
			}
		}
	</script>
</body>

</html>
