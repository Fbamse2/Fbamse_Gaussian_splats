<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
        (function () {
            var requestedPath = location.pathname + location.search + location.hash;
            var next = '/?redirect=' + encodeURIComponent(requestedPath);
            location.replace(next);
        })();
    </script>
</head>
<body></body>
</html>
