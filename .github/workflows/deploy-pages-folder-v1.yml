name: Deploy v1 to GitHub Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Upload v1 folder
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./v1

      - name: Deploy
        uses: actions/deploy-pages@v4
